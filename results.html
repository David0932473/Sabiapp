<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sabi - Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="results.css">
    <link rel="stylesheet" href="review.css">
</head>
<body>
    <header class="results-header">
        <h2>SABI ANALYTICS</h2>
        <button class="home-btn" onclick="window.location.href='index.html'">HOME</button>
    </header>

    <main class="dashboard-container">
        <div class="score-card">
            <h3 class="score-title">UTME TOTAL SCORE</h3>
            <div class="score-display">
                <span class="score-number" id="total-score">0</span>
                <span class="score-max">/ 400</span>
            </div>
            <div class="badge-box" id="badge-box">
                <span class="badge-icon" id="badge-icon">🏅</span>
                <span class="badge-text" id="badge-text">Calculating...</span>
            </div>
            <p class="sabi-advice" id="sabi-advice">Analyzing your performance...</p>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-label">TIME SPENT</span>
                <span class="stat-value" id="time-spent">00:00</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">ACCURACY</span>
                <span class="stat-value" id="accuracy-percent">0%</span>
            </div>
        </div>

        <h3 class="section-title">SUBJECT BREAKDOWN</h3>
        <div class="breakdown-grid" id="breakdown-grid">
            </div>

<button class="review-btn" onclick="window.location.href='review.html'">
    <span class="icon">🔍</span> CHECK CORRECTIONS
</button>


            <button class="action-btn primary" onclick="retakeExam()">RETAKE EXAM</button>
        </div>
    </main>

    <script src="results.js"></script>
</body>
</html>

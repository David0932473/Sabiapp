<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sabi - JAMB Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jamb-setup.css">
</head>
<body>

<div id="setup-engine">
    <div class="top-bar">
        <a href="pq.html" class="back-btn">← Cancel</a>
        <div class="mode-badge" id="display-mode">Mode: Loading...</div>
    </div>
    
    <div class="header-titles">
        <h1>Configure <span class="green-text">UTME</span></h1>
        <p>Use of English is compulsory. Select 3 more electives.</p>
    </div>

    <div class="subject-grid" id="subject-container">
        </div>
</div>

<div class="bottom-action-bar">
    <div class="selection-info">
        <span id="counter">1 / 4</span>
        <span class="info-text">Subjects Selected</span>
    </div>
    <button id="start-btn" class="start-btn disabled" disabled>BOOT ENGINE</button>
</div>

<script src="jamb-setup.js"></script>

</body>
</html>

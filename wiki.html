<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sabi - Wiki Roulette</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css" type="text/css" media="all" />
    <style>
        :root {
            --bg: #000000;
            --surface: #0A0A0A;
            --surface-light: #121212;
            --border: #27272A;
            --accent: #8B5CF6; /* Purple accent for Wiki */
            --text-main: #FAFAFA;
            --text-muted: #71717A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; padding-bottom: 120px; min-height: 100vh; overflow-x: hidden; }

        #app { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* --- HEADER --- */
        .top-bar { margin-bottom: 20px; padding-top: 10px; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
        .back-btn:active { color: var(--accent); }

        .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .header-titles h1 { font-size: 32px; font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
        .header-titles p { font-size: 14px; color: var(--text-muted); font-weight: 500; margin-top: 8px; }
        .purple-text { color: var(--accent); }

        /* --- THE TRIGGER DICE BUTTON --- */
        .dice-btn { 
            background: linear-gradient(145deg, #1e1b4b, #2e1065); 
            border: 1px solid rgba(139, 92, 246, 0.3); 
            border-radius: 20px; 
            width: 60px; height: 60px; 
            font-size: 32px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.2), inset 0 2px 5px rgba(255,255,255,0.1);
        }
        .dice-btn:active { transform: scale(0.9); border-color: var(--accent); }

        /* --- BENTO WIKI CARD --- */
        .bento-card { 
            background: var(--surface-light); 
            border: 1px solid var(--border); 
            border-radius: 28px; 
            padding: 30px; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            min-height: 350px;
            display: flex; flex-direction: column; justify-content: center;
        }

        /* --- LOADING STATE UI --- */
        #loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .big-loading-dice { font-size: 60px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        #loading-state h2 { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; }
        #loading-state p { color: var(--text-muted); font-size: 13px; font-weight: 500;}

        /* Smooth Continuous Rolling Animation */
        @keyframes smoothRoll {
            0% { transform: rotate(0deg) scale(1); filter: drop-shadow(0 0 0px var(--accent)); }
            50% { transform: rotate(180deg) scale(1.15); filter: drop-shadow(0 0 25px var(--accent)); } 
            100% { transform: rotate(360deg) scale(1); filter: drop-shadow(0 0 0px var(--accent)); }
        }
        .is-rolling { animation: smoothRoll 0.6s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        .btn-rolling { pointer-events: none; opacity: 0.7; animation: smoothRoll 0.6s cubic-bezier(0.4, 0, 0.2, 1) infinite; border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); }

        /* --- LOADED CONTENT UI --- */
        #content-state { display: none; flex-direction: column; align-items: flex-start; text-align: left; }
        .topic-tag { background: rgba(139, 92, 246, 0.1); color: var(--accent); padding: 6px 12px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border: 1px solid rgba(139, 92, 246, 0.2); }
        #wiki-title { font-size: 24px; font-weight: 900; margin-bottom: 15px; line-height: 1.2; letter-spacing: -0.5px; }
        #wiki-image { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; display: none; border: 1px solid var(--border); }
        #wiki-summary { line-height: 1.6; color: #D1D5DB; font-size: 14px; margin-bottom: 25px; width: 100%; }

        /* --- READ FULL ARTICLE BUTTON --- */
        .read-btn { 
            background: var(--text-main); color: var(--bg); border: none; 
            padding: 16px 24px; border-radius: 16px; font-weight: 800; font-family: 'Outfit', sans-serif;
            cursor: pointer; width: 100%; transition: 0.2s; font-size: 14px; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
        .read-btn:active { transform: scale(0.97); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app" class="page-transition-wrapper">
    <div class="top-bar">
        <a href="index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Dashboard
        </a>
    </div>

    <div class="header-row">
        <div class="header-titles">
            <h1>Wiki <span class="purple-text">Roulette</span></h1>
            <p>Spin the academic wheel.</p>
        </div>
        <button id="dice-btn" class="dice-btn" onclick="spinWikiRoulette()" title="Spin Again">🎲</button>
    </div>

    <div class="bento-card">
        <div id="loading-state">
            <div id="big-loader" class="big-loading-dice">🎲</div>
            <h2>Spinning...</h2>
            <p>Fetching from the global archives...</p>
        </div>

        <div id="content-state">
            <span class="topic-tag" id="wiki-tag">Discovery</span>
            <h2 id="wiki-title"></h2>
            <img id="wiki-image" src="" alt="Topic Image">
            <p id="wiki-summary"></p>
            <button class="read-btn" onclick="openFullArticle()">
                Read Full Article
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </div>
</div>

        </svg>
        <span class="nav-label">Home</span>

    <a href="pq.html" class="nav-item">

    <a href="wiki.html" class="nav-item active">

</nav>

<script src="wiki.js"></script>
<script src="global.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Sliding indicator logic specific to this page
        const indicator = document.getElementById('nav-indicator');
        const activeTab = document.querySelector('.nav-item.active');
        if (activeTab && indicator) {
            indicator.style.width = `${activeTab.offsetWidth}px`;
            indicator.style.left = `${activeTab.offsetLeft}px`;
        }
    });
</script>
</body>

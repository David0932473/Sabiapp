<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabi OS - Test Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0A0A0b;
            --input-bg: #161617;
            --border: #1A1A1A;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --sabi-blue: #3B82F6;
            --success: #10B981;
            --error: #EF4444;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; justify-content: center; }
        
        .arena-container { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 10px; }
        .subject-title { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .progress-pill { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .tab { 
            padding: 10px 18px; border-radius: 14px; background: var(--card-bg); border: 1px solid var(--border); 
            color: var(--text-muted); font-weight: 600; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.2s;
        }
        .tab.active { background: rgba(59, 130, 246, 0.15); color: var(--sabi-blue); border-color: var(--sabi-blue); }

        /* QUESTION CARD */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; flex: 1; display: flex; flex-direction: column; }
        #q-meta { font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
        #q-text { font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 600; line-height: 1.5; margin-bottom: 30px; white-space: pre-wrap; color: #fff; }

        /* INTERACTION ELEMENTS */
        .options { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { 
            padding: 18px 20px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 16px; 
            color: #fff; text-align: left; font-size: 15px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: 0.2s; 
        }
        .opt-btn:active:not(:disabled) { transform: scale(0.98); }
        .opt-btn.correct { background: rgba(16, 185, 129, 0.1) !important; border-color: var(--success) !important; color: var(--success) !important; font-weight: 600; }
        .opt-btn.wrong { background: rgba(239, 68, 68, 0.1) !important; border-color: var(--error) !important; color: var(--error) !important; }

        .text-input { width: 100%; padding: 20px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 16px; color: #fff; font-size: 15px; margin-bottom: 20px; outline: none; font-family: inherit; }
        .text-input:focus { border-color: var(--sabi-blue); }
        
        .action-btn { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 16px; font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .action-btn:active { transform: scale(0.98); }

        /* FEEDBACK */
        .feedback { margin-top: 25px; padding: 20px; border-radius: 16px; background: var(--input-bg); border: 1px solid var(--border); display: none; }
        .feedback.success { border-left: 4px solid var(--success); }
        .feedback.error { border-left: 4px solid var(--error); }
        .feedback h4 { margin: 0 0 8px 0; font-family: 'Poppins', sans-serif; font-size: 14px; text-transform: uppercase; }
        .feedback p { margin: 0; font-size: 14px; color: var(--text-muted); line-height: 1.5; }

        /* BOTTOM CONTROLS */
        .controls { display: flex; gap: 12px; margin-top: 15px; }
        .nav-btn { flex: 1; padding: 18px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; color: #fff; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.98); background: #111; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="arena-container">
        <div class="header">
            <h2 class="subject-title" id="display-subject">Test Room</h2>
            <div class="progress-pill"><span id="progress-text">0%</span> Done</div>
        </div>

        <div class="tabs">
            <button class="tab" id="tab-MCQ" onclick="switchSection('MCQ')">Part I (MCQ)</button>
            <button class="tab" id="tab-SAQ" onclick="switchSection('SAQ')">Part II (SAQ)</button>
            <button class="tab" id="tab-ESSAY" onclick="switchSection('ESSAY')">Theory</button>
        </div>

        <div class="card">
            <div id="q-meta">SYSTEM STATUS</div>
            <div id="q-text">Initializing Sabi OS Test Engine...</div>
            <div id="interaction-area" class="options"></div>
            
            <div id="feedback-panel" class="feedback">
                <h4 id="feedback-title"></h4>
                <p id="insight-text"></p>
            </div>
        </div>

        <div class="controls" id="arena-controls"></div>
    </div>
    <script src="ican-pq.js"></script>
</body>
</html>
